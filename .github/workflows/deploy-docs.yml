name: Deploy MkDocs to GitHub Pages

on:
  # Run after region-watch workflow completes
  workflow_run:
    workflows: ["Region watch (GitHub Markdown)"]
    types:
      - completed
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Also run on push to main for docs changes
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'generate_docs.py'
      - '.region-watch/**'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material

      - name: Generate docs from snapshot
        run: python generate_docs.py

      - name: Build MkDocs site
        run: mkdocs build

      - name: Copy data files for agent knowledge sources
        run: |
          for f in region_diff_europe_sku_flat.json region_diff_europe_summary.md \
                   region_diff_worldwide_sku_flat.json region_diff_worldwide_summary.md \
                   region_diff_europe_agent.json region_diff_europe_changes.json \
                   region_diff_worldwide_agent.json region_diff_worldwide_changes.json \
                   region_diff_europe_agent.md region_diff_worldwide_agent.md; do
            [ -f "$f" ] && cp "$f" site/ && echo "Copied $f" || echo "Skipped $f (not found)"
          done
          for d in region_diff_europe_regions region_diff_worldwide_regions; do
            if [ -d "$d" ]; then
              for f in "$d"/*.md; do
                base=$(basename "$f")
                scope=$(echo "$d" | sed 's/region_diff_//' | sed 's/_regions//')
                cp "$f" "site/${scope}-${base}" && echo "Copied ${scope}-${base}"
              done
            fi
          done

      - name: Copy plain-text knowledge files for Copilot Studio
        run: |
          mkdir -p site/kb
          pip install markdown
          python3 -c "
          import markdown, glob, os
          for f in sorted(glob.glob('docs/regions/*.md') + glob.glob('docs/models/*.md')):
              if os.path.basename(f) == 'index.md': continue
              name = os.path.splitext(os.path.basename(f))[0]
              with open(f) as fh: md = fh.read()
              html = markdown.markdown(md, extensions=['tables'])
              page = f'<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>{name}</title></head><body>{html}</body></html>'
              out = f'site/kb/{name}/index.html'
              os.makedirs(os.path.dirname(out), exist_ok=True)
              with open(out, 'w') as o: o.write(page)
          print(f'Generated {len(glob.glob(\"site/kb/*/index.html\"))} plain HTML knowledge pages')
          "
          echo "Copied $(ls site/plain/*.txt | wc -l) plain-text knowledge files"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000  # 10 minutes (in milliseconds)

