name: Deploy MkDocs to GitHub Pages

on:
  # Run after region-watch workflow completes
  workflow_run:
    workflows: ["Region watch (GitHub Markdown)"]
    types:
      - completed
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Also run on push to main for docs changes
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'generate_docs.py'
      - '.region-watch/**'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material

      - name: Generate docs from snapshot
        run: python generate_docs.py

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Copy data files for agent knowledge sources
        run: |
          for f in region_diff_europe_sku_flat.json region_diff_europe_summary.md \
                   region_diff_worldwide_sku_flat.json region_diff_worldwide_summary.md \
                   region_diff_europe_agent.json region_diff_europe_changes.json \
                   region_diff_worldwide_agent.json region_diff_worldwide_changes.json \
                   region_diff_europe_agent.md region_diff_worldwide_agent.md; do
            [ -f "$f" ] && cp "$f" site/ && echo "Copied $f" || echo "Skipped $f (not found)"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000  # 10 minutes (in milliseconds)

