name: Region watch (GitHub Markdown)
on:
  schedule: [{ cron: "0 */6 * * *" }]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # boosts rate limits
        run: |
          python .region-watch/diff_regions.py > region_diff.json
          cat region_diff.json
          cat region_diff_europe.json
          cat region_diff_europe_flat.json
          cat region_diff_europe_summary.md
          cat region_diff_worldwide.json
          cat region_diff_worldwide_flat.json
          cat region_diff_worldwide_summary.md

      - name: Detect changes
        id: detect
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          diff = json.loads(Path("region_diff.json").read_text(encoding="utf-8"))
          Path(".region-watch").mkdir(exist_ok=True)

          def has_change_block(block: dict) -> bool:
              if not isinstance(block, dict):
                  return False
              added = block.get("added") or []
              removed = block.get("removed") or []
              return bool(added or removed)

          def has_change_entry(entry: dict) -> bool:
              if not isinstance(entry, dict):
                  return False
              if has_change_block(entry.get("all") or {}):
                  return True
              if entry.get("model_removed"):
                  return True
              for sku_change in (entry.get("skus") or {}).values():
                  if has_change_block(sku_change) or sku_change.get("sku_removed"):
                      return True
              return False

          detected = any(
              has_change_entry(change)
              for change in (diff.get("changes") or {}).values()
          )

          Path(".region-watch/has_change.flag").write_text(
              "true" if detected else "false", encoding="utf-8"
          )
          PY
          echo "has_change=$(cat .region-watch/has_change.flag)" >> "$GITHUB_OUTPUT"

      - name: Render REGION_AVAILABILITY.md
        if: ${{ steps.detect.outputs.has_change == 'true' }}
        run: python .region-watch/render_markdown.py

      - name: Commit snapshot if changed
        run: |
          git config user.email "bot@users.noreply.github.com"
          git config user.name "region-bot"
          git add .region-watch/regions_snapshot.json .region-watch/history region_diff.json region_diff_europe.json region_diff_europe_flat.json region_diff_europe_summary.md region_diff_worldwide.json region_diff_worldwide_flat.json region_diff_worldwide_summary.md REGION_AVAILABILITY.md
          git diff --cached --quiet || git commit -m "Update region snapshot"
          git push

      - name: Notify via GitHub issue
        if: ${{ hashFiles('region_diff.json') != '' && steps.detect.outputs.has_change == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── Load all data sources ──────────────────────────────────
            const diff     = JSON.parse(fs.readFileSync('region_diff.json', 'utf8'));
            const europe   = JSON.parse(fs.readFileSync('region_diff_europe.json', 'utf8'));
            const world    = JSON.parse(fs.readFileSync('region_diff_worldwide.json', 'utf8'));
            const euroSum  = fs.readFileSync('region_diff_europe_summary.md', 'utf8');
            const worldSum = fs.readFileSync('region_diff_worldwide_summary.md', 'utf8');

            const timestamp = diff.timestamp || new Date().toISOString();
            const updateSrc = europe.updates?.timestamp || timestamp;

            // ── Helper: check if any real change exists ────────────────
            const hasChange = Object.values(diff.changes || {}).some(c => {
              const a = c?.all?.added ?? [], r = c?.all?.removed ?? [];
              const skuDelta = Object.values(c?.skus || {}).some(
                s => s?.added?.length || s?.removed?.length || s?.sku_removed
              );
              return a.length || r.length || skuDelta || c?.model_removed;
            });
            if (!hasChange) { core.info('No region changes'); return; }

            const owner = context.repo.owner, repo = context.repo.repo;
            const fmt = r => `\`${r}\``;

            // ── Classify changed models ────────────────────────────────
            const added = [], removed = [], retired = [];
            for (const [m, ch] of Object.entries(diff.changes).sort((a, b) => a[0].localeCompare(b[0]))) {
              let hasA = (ch?.all?.added?.length ?? 0) > 0;
              let hasR = (ch?.all?.removed?.length ?? 0) > 0;
              for (const s of Object.values(ch?.skus || {})) {
                if (s?.added?.length) hasA = true;
                if (s?.removed?.length || s?.sku_removed) hasR = true;
              }
              if (ch?.model_removed) retired.push(m);
              else { if (hasA) added.push(m); if (hasR) removed.push(m); }
            }

            // ── Parse summary stats from markdown ──────────────────────
            function parseSummaryStats(md) {
              const stats = {};
              for (const line of md.split('\n')) {
                const kv = line.match(/^- (.+?):\s*(\d+)/);
                if (kv) stats[kv[1].trim()] = parseInt(kv[2], 10);
              }
              return stats;
            }

            const euroStats  = parseSummaryStats(euroSum);
            const worldStats = parseSummaryStats(worldSum);

            // ── Build lookup maps from JSON views ──────────────────────
            const euroByRegion = new Map(europe.views.by_region.map(r => [r.region, r]));
            const euroByModel  = new Map(europe.views.by_model.map(m => [m.model, m]));
            const worldByRegion = new Map(world.views.by_region.map(r => [r.region, r]));
            const worldByModel  = new Map(world.views.by_model.map(m => [m.model, m]));

            // ── Title ──────────────────────────────────────────────────
            const dateStr = timestamp.slice(0, 10);
            const totalAdded   = (euroStats['Added region placements'] || 0);
            const totalRemoved = (euroStats['Removed region placements'] || 0);
            const title = `Azure AI Model Watch | ${dateStr} | +${totalAdded} / -${totalRemoved} EU placements`;

            // ── Helper: render a region/model section ──────────────────
            function renderRegionSection(byRegion, scope) {
              let s = '';
              const regions = [...byRegion.values()]
                .filter(r => r.updates.added_models.length || r.updates.removed_models.length)
                .sort((a, b) => a.region.localeCompare(b.region));
              if (!regions.length) { s += `_No datacenter changes._\n\n`; return s; }
              for (const r of regions) {
                const a = r.updates.added_models, d = r.updates.removed_models;
                const badge = d.length && !a.length ? '🔴' : '🟢';
                s += `<details open>\n<summary>${badge} <strong>${r.region}</strong> — ${r.model_count} models`;
                if (a.length) s += ` · +${a.length} added`;
                if (d.length) s += ` · -${d.length} removed`;
                s += `</summary>\n\n`;
                if (a.length) s += `🟢 **Added:** ${a.sort().map(fmt).join(', ')}\n\n`;
                if (d.length) s += `🔴 **Removed:** ${d.sort().map(fmt).join(', ')}\n\n`;
                s += `</details>\n\n`;
              }
              return s;
            }

            function renderModelSection(byModel, scope) {
              let s = '';
              const models = [...byModel.values()]
                .filter(m => m.updates.added_regions.length || m.updates.removed_regions.length || m.updates.model_removed)
                .sort((a, b) => a.model.localeCompare(b.model));
              if (!models.length) { s += `_No model changes._\n\n`; return s; }
              for (const m of models) {
                const a = m.updates.added_regions, d = m.updates.removed_regions;
                const icon = m.updates.model_removed ? '⚠️' : (d.length && !a.length ? '🔴' : '🟢');
                s += `<details open>\n<summary>${icon} <strong>${m.model}</strong> — ${m.region_count} ${scope} regions`;
                if (a.length) s += ` · +${a.length} added`;
                if (d.length) s += ` · -${d.length} removed`;
                if (m.updates.model_removed) s += ` · RETIRED`;
                s += `</summary>\n\n`;
                if (m.updates.model_removed) {
                  s += `> ⚠️ **This model has been fully removed.**\n\n`;
                } else {
                  if (a.length) s += `🟢 **Now available in:** ${a.sort().map(fmt).join(', ')}\n\n`;
                  if (d.length) s += `🔴 **Removed from:** ${d.sort().map(fmt).join(', ')}\n\n`;
                  // SKU detail
                  const skuUpd = (m.updates.sku_updates || []).filter(
                    sk => sk.added_regions?.length || sk.removed_regions?.length || sk.sku_removed
                  );
                  if (skuUpd.length) {
                    s += `| SKU | Change | Regions |\n|-----|--------|--------|\n`;
                    for (const sk of skuUpd) {
                      if (sk.added_regions?.length)  s += `| ${sk.label || sk.sku} | 🟢 Added | ${sk.added_regions.sort().map(fmt).join(', ')} |\n`;
                      if (sk.removed_regions?.length) s += `| ${sk.label || sk.sku} | 🔴 Removed | ${sk.removed_regions.sort().map(fmt).join(', ')} |\n`;
                      if (sk.sku_removed)             s += `| ${sk.label || sk.sku} | ⚠️ Removed | — |\n`;
                    }
                    s += `\n`;
                  }
                }
                s += `</details>\n\n`;
              }
              return s;
            }

            // ── Body ───────────────────────────────────────────────────
            let body = '';

            // ─ 1. Executive summary ────────────────────────────────────
            body += `# 📊 Azure AI Foundry — Model Availability Update\n\n`;
            body += `| | Detail |\n|---|---|\n`;
            body += `| **Scan time** | ${timestamp} |\n`;
            body += `| **Update source** | ${updateSrc} |\n`;
            body += `| **Models with changes** | ${added.length + removed.length + retired.length} |\n`;
            body += `| **New region placements** | 🟢 ${worldStats['Added region placements'] || '–'} worldwide / ${euroStats['Added region placements'] || '–'} Europe |\n`;
            body += `| **Removed region placements** | 🔴 ${worldStats['Removed region placements'] || '–'} worldwide / ${euroStats['Removed region placements'] || '–'} Europe |\n\n`;

            // ─ 2. What changed? (quick bullets) ────────────────────────
            body += `## 🔔 What Changed?\n\n`;
            if (added.length)   body += `**Models gaining regions (${added.length}):** ${added.map(fmt).join(', ')}\n\n`;
            if (removed.length) body += `**Models losing regions (${removed.length}):** ${removed.map(fmt).join(', ')}\n\n`;
            if (retired.length) body += `**Models retired (${retired.length}):** ${retired.map(fmt).join(', ')}\n\n`;

            // ─ 3. Europe ───────────────────────────────────────────────
            body += `---\n\n## 🇪🇺 Europe Overview\n\n`;
            body += `> ${euroStats['Models currently available in Europe'] || '?'} models across ${euroStats['Regions tracked'] || '?'} tracked regions · `;
            body += `${euroStats['Regions with current availability'] || '?'} regions active\n\n`;

            body += `### Datacenter Changes — Which models were added/removed per region\n\n`;
            body += renderRegionSection(euroByRegion, 'EU');

            body += `### Model Changes — Which regions each model was added to/removed from\n\n`;
            body += renderModelSection(euroByModel, 'EU');

            // ─ 4. Worldwide ────────────────────────────────────────────
            body += `---\n\n## 🌍 Worldwide Overview\n\n`;
            body += `> ${worldStats['Models currently available in Worldwide'] || '?'} models across ${worldStats['Regions tracked'] || '?'} tracked regions · `;
            body += `${worldStats['Regions with current availability'] || '?'} regions active\n\n`;

            body += `### Datacenter Changes — Which models were added/removed per region\n\n`;
            body += renderRegionSection(worldByRegion, 'global');

            body += `### Model Changes — Which regions each model was added to/removed from\n\n`;
            body += renderModelSection(worldByModel, 'global');

            // ─ 6. Footer ──────────────────────────────────────────────
            body += `---\n\n`;
            body += `📖 [Full availability dashboard](https://${owner}.github.io/${repo}/) · `;
            body += `🔔 Watch this repo → Issues to get notifications\n`;

            // ── Create the issue ───────────────────────────────────────
            const label = 'region-watch';
            const assignees = (process.env.ISSUE_ASSIGNEES || '')
              .split(',').map(v => v.trim()).filter(Boolean);

            const payload = { owner, repo, title, body, labels: [label] };
            if (assignees.length) payload.assignees = assignees;

            try {
              await github.rest.issues.create(payload);
            } catch (error) {
              core.warning(`Issue creation failed: ${error}`);
              if (assignees.length) {
                delete payload.assignees;
                await github.rest.issues.create(payload);
              } else { throw error; }
            }
