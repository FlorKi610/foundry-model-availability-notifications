site_name: Azure OpenAI Foundry Model Availability
site_description: Track Azure OpenAI Foundry model availability across regions and SKUs
site_url: https://FlorKi610.github.io/foundry-model-availability-notifications
repo_url: https://github.com/FlorKi610/foundry-model-availability-notifications
repo_name: FlorKi610/foundry-model-availability-notifications

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.tabs.link
    - content.tooltips
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

validation:
  links:
    unrecognized_links: ignore

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/custom.css
  - https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css
  - https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css

extra_javascript:
  - https://code.jquery.com/jquery-3.7.1.min.js
  - https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js
  - https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js
  - https://cdn.datatables.net/buttons/2.4.2/js/buttons.colVis.min.js
  - javascripts/tables.js

